<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">

  <!-- Fundo brand blue sólido — lê em qualquer contexto de aba -->
  <rect width="32" height="32" rx="7" fill="#4b69f5"/>

  <!--
    P geométrico bold — desenhado nativamente em 32px:

    Haste:  x 5→12 (7px de espessura — bold para legibilidade a 16px)
    Arco:   bezier cúbica simétrica, pico em x≈25
    Paredes do arco: 4px topo · 4px base · 3px lateral — intencionais

    Outer: M5,4 → H20 → C(27,4)(27,19)→(20,19) → H12 → V28 → H5 → Z
    Hollow: M12,8 → H19 → C(23,8)(23,15)→(19,15) → H12 → Z
  -->
  <path
    fill="white"
    fill-rule="evenodd"
    d="M5 4H20C27 4 27 19 20 19H12V28H5ZM12 8H19C23 8 23 15 19 15H12Z"
  />

</svg>
